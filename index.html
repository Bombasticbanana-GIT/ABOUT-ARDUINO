<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Arduino UNO Professional Site</title>
</head>
<body>
    <header>
        <div class="hero">
            <div class="slideshow">
                <img src="https://www.arduino.cc/en/uploads/Guide/Arduino_Uno_Rev3.png" alt="Arduino UNO" />
                <img src="https://www.arduino.cc/en/uploads/Guide/Arduino_Uno_Rev3_PNG.png" alt="Arduino UNO" />
            </div>
        </div>
    </header>

    <main>
        <section id="pin-diagram">
            <!-- Inline SVG pin diagram here -->
            <!-- Instructions to replace with local images in /images -->
        </section>
        <section id="pin-cards">
            <div class="pin-card">Pin 2: Digital I/O</div>
            <div class="pin-card">Pin 3: Digital I/O</div>
            <!-- Add more pin cards -->
        </section>
        <section id="power-specs">
            <table>
                <tr><td>Voltage</td><td>5V</td></tr>
                <tr><td>Current</td><td>50mA</td></tr>
            </table>
        </section>
        <section id="programming-examples">
            <p>Example code snippets here.</p>
        </section>
        <section id="safety-troubleshooting">
            <p>Safety tips and troubleshooting common issues.</p>
        </section>
        <section id="presentation">
            <div class="modal">
                <p>Presentation Content Here</p>
            </div>
        </section>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
